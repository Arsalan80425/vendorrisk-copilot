services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./mlruns:/app/mlruns

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env.example
    environment:
      - API_BASE_URL=http://api:8000
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./mlruns:/app/mlruns
    depends_on:
      - api

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      sh -c "pip install --no-cache-dir 'mlflow>=2.14.0' &&
             mlflow ui --host 0.0.0.0 --port 5000"
